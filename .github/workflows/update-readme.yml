name: Update profile README

on:
  schedule:
    - cron: '0 2 * * *'   # daily 02:00 UTC
  workflow_dispatch:
  repository_dispatch:
    types: [repo-added]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update repo tables
        run: node scripts/update-readme.js

      - name: Commit if changed
        run: |
          git config user.name "veris"
          git config user.email "hello@veris.kr"
          git add README.md
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: auto-update repo tables [skip ci]" && git push
